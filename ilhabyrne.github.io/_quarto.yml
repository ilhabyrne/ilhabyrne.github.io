project:
  type: website
  output-dir: ../docs
  resources:
    - images/reef-cay.jpg
  render:
    - "*.qmd"

website:
  title: "Ilha Byrne"
  description: "I am a zoologist, evolutionary biologist and science communicator, and a PhD candidate at the University of Queensland researching coral population and conservation genomics, evolutionary genomics and environmental DNA."
  site-url: https://ilhabyrne.github.io
  favicon: images/favicon.svg
  open-graph: true
  twitter-card: true
  navbar:
    background: primary
    title: "Ilha Byrne"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: research.qmd
        text: Research
      - href: publications.qmd
        text: Publications & Talks
      - href: outreach.qmd
        text: Teaching & Outreach
      - href: photography.qmd
        text: Photography
      - href: cv.qmd
        text: CV
    right:
      - icon: envelope
        href: "mailto:ilhabyrne@gmail.com"
        aria-label: Email
      - icon: github
        href: https://github.com/ilhabyrne
        aria-label: GitHub
      - icon: instagram
        href: https://www.instagram.com/biologist.byrne
        aria-label: Instagram
  page-footer:
    left: "© 2026 Ilha Byrne"
    center: "Zoologist & evolutionary biologist · University of Queensland"
    right:
      - icon: envelope
        href: "mailto:ilhabyrne@gmail.com"
      - icon: github
        href: https://github.com/ilhabyrne

format:
  html:
    theme: [cosmo, theme.scss]
    toc: true
    toc-location: right
    include-in-header: head.html
    smooth-scroll: true
    link-external-newwindow: true
    grid:
      body-width: 860px

editor: visual
